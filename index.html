<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>海洋冒险 - Ocean Adventure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none;
        }
        canvas {
            display: block;
            background: #000;
        }
        #errorMsg {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(255,0,0,0.8);
            color: #fff;
            padding: 10px;
            font: 13px Arial;
            border-radius: 6px;
            display: none;
            z-index: 999;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="errorMsg"></div>
    <script src="game-engine.js"></script>
</body>
</html>
