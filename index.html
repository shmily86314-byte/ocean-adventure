<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>海洋冒险 - Ocean Adventure</title>
    <!-- 微信分享卡片 -->
    <meta property="og:title" content="海洋冒险 - 一条鱼的进化之旅">
    <meta property="og:description" content="在60秒内不断吞噬小鱼进化！从小虾米到海洋霸主，10阶进化，写实海洋世界，等你来挑战！🏆">
    <meta property="og:image" content="https://raw.githubusercontent.com/shmily86314-byte/ocean-adventure/main/assets/shrimp.png">
    <meta property="og:type" content="game">
    <meta property="og:site_name" content="海洋冒险">
    <meta name="description" content="在60秒内不断吞噬小鱼进化！从小虾米到海洋霸主，10阶进化，写实海洋世界，等你来挑战！">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none;
        }
        canvas {
            display: block;
            background: #000;
        }
        #errorMsg {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(255,0,0,0.8);
            color: #fff;
            padding: 10px;
            font: 13px Arial;
            border-radius: 6px;
            display: none;
            z-index: 999;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="errorMsg"></div>
    <script src="game-engine.js"></script>
</body>
