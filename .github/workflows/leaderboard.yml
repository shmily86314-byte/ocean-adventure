name: Update Leaderboard

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Player name'
        required: true
        type: string
      score:
        description: 'Player score'
        required: true
        type: number

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read and update leaderboard
        run: |
          # 读取当前排行榜
          if [ -f leaderboard.json ]; then
            cat leaderboard.json
          else
            echo '[]' > leaderboard.json
          fi

          # 使用Python处理
          python3 << 'PYEOF'
import json

# 读取当前数据
with open('leaderboard.json', 'r') as f:
    try:
        data = json.load(f)
    except:
        data = []

# 确保数据格式正确
if not isinstance(data, list):
    data = []

# 新记录
new_entry = {
    "name": "${{ github.event.inputs.name }}",
    "score": ${{ github.event.inputs.score }}
}

# 合并
data.append(new_entry)
data.sort(key=lambda x: x.get('score', 0), reverse=True)
data = data[:10]

# 写入
with open('leaderboard.json', 'w') as f:
    json.dump(data, f, ensure_ascii=False)

print(f"Leaderboard updated: {len(data)} entries")
PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leaderboard.json
          git diff --staged --quiet || git commit -m "Update leaderboard (score: ${{ github.event.inputs.score }})"
          git push
