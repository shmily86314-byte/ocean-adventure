name: Update Leaderboard

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Player name'
        required: true
        type: string
      score:
        description: 'Player score'
        required: true
        type: number

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update leaderboard
        env:
          PLAYER_NAME: ${{ github.event.inputs.name }}
          PLAYER_SCORE: ${{ github.event.inputs.score }}
        run: |
          # 读取当前排行榜
          if [ -f leaderboard.json ]; then
            cat leaderboard.json
          else
            echo '[]' > leaderboard.json
          fi

          # 用Python处理
          python3 -c "
import json, os
with open('leaderboard.json') as f:
    try: data = json.load(f)
    except: data = []
if not isinstance(data, list): data = []
data.append({'name': os.environ['PLAYER_NAME'], 'score': int(os.environ['PLAYER_SCORE'])})
data.sort(key=lambda x: x.get('score',0), reverse=True)
data = data[:10]
with open('leaderboard.json','w') as f:
    json.dump(data, f, ensure_ascii=False)
print(f'OK: {len(data)} entries')
"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leaderboard.json
          git diff --staged --quiet || git commit -m "Update leaderboard"
          git push
