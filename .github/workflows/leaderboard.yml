name: Leaderboard

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Player name'
        required: true
        type: string
      score:
        description: 'Player score'
        required: true
        type: number

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Process
        env:
          PN: ${{ github.event.inputs.name }}
          PS: ${{ github.event.inputs.score }}
        run: |
          if [ -f leaderboard.json ]; then cat leaderboard.json; else echo '[]' > leaderboard.json; fi
          python3 -c "
import json,os
with open('leaderboard.json') as f:
    try: d=json.load(f)
    except: d=[]
if not isinstance(d,list): d=[]
d.append({'name':os.environ['PN'],'score':int(os.environ['PS'])})
d.sort(key=lambda x:x.get('score',0),reverse=True)
d=d[:10]
json.dump(d,open('leaderboard.json','w'),ensure_ascii=False)
"
      - run: |
          git config user.name "bot"
          git config user.email "bot@noreply"
          git add leaderboard.json
          git diff --staged --quiet || git commit -m "lb update"
          git push
