name: Leaderboard

on:
  workflow_dispatch:
    inputs:
      name:
        required: true
        type: string
      score:
        required: true
        type: number

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Process leaderboard
        env:
          PN: ${{ github.event.inputs.name }}
          PS: ${{ github.event.inputs.score }}
        run: |
          if [ ! -f leaderboard.json ]; then echo '[]' > leaderboard.json; fi
          python3 << 'EOF'
import json, os
with open('leaderboard.json') as f:
    try: d = json.load(f)
    except: d = []
if not isinstance(d, list): d = []
d.append({'name': os.environ['PN'], 'score': int(os.environ['PS'])})
d.sort(key=lambda x: x.get('score', 0), reverse=True)
d = d[:10]
json.dump(d, open('leaderboard.json', 'w'), ensure_ascii=False)
EOF

      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@noreply"
          git add leaderboard.json
          git diff --staged --quiet || (git commit -m "lb update" && git push)
